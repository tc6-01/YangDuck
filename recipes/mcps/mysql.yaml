id: mysql-mcp
name: MySQL MCP
type: mcp
description: 让 AI 助手直接查询和操作你的 MySQL 数据库
tags: [database, mysql]
difficulty: beginner
install:
  method: npm
  package: "@benborla29/mcp-server-mysql"
targets:
  cursor:
    config_path: ".cursor/mcp.json"
    config:
      mcpServers:
        mysql:
          command: "npx"
          args: ["-y", "@benborla29/mcp-server-mysql"]
          env:
            MYSQL_HOST: "MYSQL_HOST"
            MYSQL_PORT: "MYSQL_PORT"
            MYSQL_USER: "MYSQL_USER"
            MYSQL_PASSWORD: "MYSQL_PASSWORD"
  claude-code:
    config_path: "~/.claude/claude_desktop_config.json"
    config:
      mcpServers:
        mysql:
          command: "npx"
          args: ["-y", "@benborla29/mcp-server-mysql"]
          env:
            MYSQL_HOST: "MYSQL_HOST"
            MYSQL_PORT: "MYSQL_PORT"
            MYSQL_USER: "MYSQL_USER"
            MYSQL_PASSWORD: "MYSQL_PASSWORD"
prompts:
  - key: MYSQL_HOST
    ask: "MySQL 地址（如果在你电脑上就用默认的）"
    default: "127.0.0.1"
  - key: MYSQL_PORT
    ask: "MySQL 端口"
    default: "3306"
  - key: MYSQL_USER
    ask: "MySQL 用户名"
    default: "root"
  - key: MYSQL_PASSWORD
    ask: "MySQL 密码"
    secret: true
quickstart:
  - title: 试试看
    explain: 重启 Cursor，然后问 AI："帮我看看数据库里有哪些表"
  - title: 查数据
    explain: 问 AI："查询 users 表的前 10 条数据"
  - title: 写 SQL
    explain: 问 AI："帮我写一个查询最近 7 天注册用户的 SQL"
